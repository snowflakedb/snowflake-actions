# action.yml
name: "Snowflake Actions"
description: "Snowflake CI/CD actions for GitHub. Install the Snowflake CLI and/or the Cortex Code CLI, and configure authentication."
branding:
  icon: "terminal"
  color: "blue"

inputs:
  # --- What to install ---------------------------------------------------
  snowflake-cli:
    description: "Install the Snowflake CLI (snow)."
    required: false
    default: "true"

  cortex-code:
    description: "Install the Cortex Code CLI (cortex)."
    required: false
    default: "false"

  # --- Snowflake CLI options ---------------------------------------------
  cli-version:
    description: "Snowflake CLI version (by default, installs the latest version)"
    required: false

  default-config-file-path:
    description: "Path to the default config file"
    required: false
    default: "./config.toml"

  custom-github-ref:
    description: "GitHub branch, tag, or commit to install the Snowflake CLI from (if set, installs from GitHub; otherwise, installs from PyPI)"
    required: false

  # --- Cortex Code CLI options -------------------------------------------
  cortex-channel:
    description: "Cortex Code CLI install channel: stable or beta"
    required: false
    default: "stable"

  cortex-version:
    description: "Cortex Code CLI version to install (e.g. 1.5.2). Use 'latest' for the newest in the channel."
    required: false
    default: "latest"

  connection-name:
    description: "Connection name written to connections.toml when configuring the Cortex Code CLI from OIDC"
    required: false
    default: "default"

  # --- Shared authentication options -------------------------------------
  use-oidc:
    description: "Enable OIDC authentication"
    required: false
    default: "false"

  oidc-token-name:
    description: >-
      "Name of the token environment variable for OIDC authentication."
      " By default it's set for [temporary connections](https://docs.snowflake.com/en/developer-guide/snowflake-cli/connecting/configure-connections#use-a-temporary-connection), "
      "however it can be changed to SNOWFLAKE_CONNECTIONS_<NAME>_TOKEN to work with named connections."
    required: false
    default: "SNOWFLAKE_TOKEN"

outputs:
  cortex-version:
    description: "Installed Cortex Code CLI version (empty if cortex-code was not installed)"
    value: ${{ steps.cortex-version.outputs.version }}

runs:
  using: "composite"
  steps:
    - name: add extra telemetry data
      shell: bash
      env:
        # Bump on each release to match the repository tag
        SF_CICD_INTEGRATION_VERSION: "v3.0.0"
      run: |
        echo "SF_GITHUB_ACTION=true" >> "$GITHUB_ENV"
        echo "SF_CICD_INTEGRATION_VERSION=$SF_CICD_INTEGRATION_VERSION" >> "$GITHUB_ENV"

    # ----------------------------------------------------------------------
    # Snowflake CLI (snow)
    # ----------------------------------------------------------------------
    # Intentionally no `python-version` here. When set, setup-uv exports
    # UV_PYTHON into $GITHUB_ENV, which persists into every later step of the
    # consumer's job. That leaks our internal Python pin (3.11) into their
    # environment and breaks subsequent `uv` invocations whose project requires
    # a different interpreter (e.g. requires-python >=3.13). The CLI's Python is
    # pinned per-install below via `uv tool install --python 3.11` instead, which
    # scopes the pin to the isolated tool environment without touching the job.
    - if: ${{ inputs.snowflake-cli == 'true' }}
      uses: astral-sh/setup-uv@681c641aba71e4a1c380be3ab5e12ad51f415867 #v7.1.6

    - name: Install Snowflake CLI
      if: ${{ inputs.snowflake-cli == 'true' }}
      shell: bash
      env:
        CLI_VERSION: ${{ inputs.cli-version }}
        CUSTOM_GITHUB_REF: ${{ inputs.custom-github-ref }}
      run: bash $GITHUB_ACTION_PATH/scripts/install-snowflake-cli.sh

    - name: Set up config.toml
      if: ${{ inputs.snowflake-cli == 'true' }}
      shell: bash
      run: bash $GITHUB_ACTION_PATH/scripts/setup-config-file.sh
      env:
        CONFIG_FILE_PATH: ${{ inputs.default-config-file-path }}

    - name: Set up workload identity authentication (Snowflake CLI)
      if: ${{ inputs.snowflake-cli == 'true' && inputs.use-oidc == 'true' }}
      shell: bash
      env:
        OIDC_TOKEN_NAME: ${{ inputs.oidc-token-name }}
      run: bash $GITHUB_ACTION_PATH/scripts/configure-snowflake-oidc.sh

    # ----------------------------------------------------------------------
    # Cortex Code CLI (cortex)
    # ----------------------------------------------------------------------
    - name: Add Cortex Code telemetry data
      if: ${{ inputs.cortex-code == 'true' }}
      shell: bash
      run: echo "SF_CORTEX_CODE_GITHUB_ACTION=true" >> "$GITHUB_ENV"

    - name: Validate Cortex Code inputs
      if: ${{ inputs.cortex-code == 'true' }}
      shell: bash
      run: |
        CHANNEL="${{ inputs.cortex-channel }}"
        if [[ "$CHANNEL" != "stable" && "$CHANNEL" != "beta" ]]; then
          echo "::error::cortex-channel must be 'stable' or 'beta', got '${CHANNEL}'"
          exit 1
        fi
        VERSION="${{ inputs.cortex-version }}"
        if [[ "$VERSION" != "latest" && ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "::error::cortex-version must be 'latest' or a semver (e.g. 1.5.2), got '${VERSION}'"
          exit 1
        fi

    - name: Install Cortex Code CLI
      if: ${{ inputs.cortex-code == 'true' }}
      shell: bash
      env:
        CORTEX_CHANNEL: ${{ inputs.cortex-channel }}
      run: bash $GITHUB_ACTION_PATH/cortex-code/scripts/install-cortex.sh

    - name: Pin specific Cortex Code version
      if: ${{ inputs.cortex-code == 'true' && inputs.cortex-version != 'latest' }}
      shell: bash
      run: |
        export PATH="${HOME}/.local/bin:$PATH"
        cortex update ${{ inputs.cortex-version }}

    - name: Set up workload identity authentication (Cortex Code)
      if: ${{ inputs.cortex-code == 'true' && inputs.use-oidc == 'true' }}
      shell: bash
      env:
        OIDC_TOKEN_NAME: ${{ inputs.oidc-token-name }}
      run: bash $GITHUB_ACTION_PATH/scripts/oidc-token.sh

    - name: Configure Cortex Code connection
      if: ${{ inputs.cortex-code == 'true' }}
      shell: bash
      env:
        CONNECTION_NAME: ${{ inputs.connection-name }}
        OIDC_TOKEN_NAME: ${{ inputs.oidc-token-name }}
      run: python3 $GITHUB_ACTION_PATH/cortex-code/scripts/setup-connection.py

    - name: Output Cortex Code version
      id: cortex-version
      if: ${{ inputs.cortex-code == 'true' }}
      shell: bash
      run: |
        export PATH="${HOME}/.local/bin:$PATH"
        VERSION=$(cortex --version 2>&1 | head -1)
        echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
        echo "Cortex Code CLI: ${VERSION}"
