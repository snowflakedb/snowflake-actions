name: Test — Cortex Code action

on:
    pull_request:
    push:
        branches: [main]
        paths: ["cortex-code/**"]
    workflow_dispatch:

permissions:
    id-token: write
    contents: read

jobs:
    install-cortex-code:
        name: Install CoCo CLI (stable)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false

            - name: Install Snowflake CLI
              uses: ./

            - name: Install Cortex Code CLI (stable, latest)
              uses: ./cortex-code

            - name: Verify cortex is on PATH
              shell: bash
              run: |
                  set -e
                  which cortex
                  cortex --version

            - name: Verify install location
              shell: bash
              run: |
                  set -e
                  test -x "${HOME}/.local/bin/cortex"

    install-beta-channel:
        name: Install CoCo CLI (beta) on ubuntu-latest
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false

            - name: Install Snowflake CLI
              uses: ./

            - name: Install Cortex Code CLI (beta channel)
              uses: ./cortex-code
              with:
                  cli-channel: beta

            - name: Verify cortex is on PATH
              shell: bash
              run: |
                  set -e
                  which cortex
                  cortex --version

