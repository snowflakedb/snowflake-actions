name: "test-04 mutual exclusion error"
on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - id: mutual-exclusion
        continue-on-error: true
        uses: ./
        with:
          cli-version: "3.19.0"
          custom-github-ref: "main"

      - name: Assert action failed (mutual exclusion enforced)
        run: |
          if [ "${{ steps.mutual-exclusion.outcome }}" != "failure" ]; then
            echo "Expected failure due to mutual exclusion, but outcome was: ${{ steps.mutual-exclusion.outcome }}"
            exit 1
          fi
          echo "OK: action correctly rejected both inputs"
